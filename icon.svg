<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Shackle (top curved part) -->
  <path d="M 70 80 Q 70 20 100 20 Q 130 20 130 80" fill="none" stroke="#1a5f5f" stroke-width="14" stroke-linecap="round"/>
  
  <!-- Body of padlock -->
  <rect x="48" y="80" width="104" height="85" rx="8" fill="#16a085" stroke="#0e6251" stroke-width="2"/>
  
  <!-- Inner body (darker) -->
  <rect x="52" y="85" width="96" height="75" rx="6" fill="#138d75"/>
  
  <!-- Keyhole -->
  <circle cx="100" cy="115" r="10" fill="#0e3f2f" stroke="#0a2824" stroke-width="1"/>
  <circle cx="100" cy="125" r="6" fill="#0e3f2f"/>
  
  <!-- Highlight (to give 3D effect) -->
  <ellipse cx="70" cy="100" rx="18" ry="25" fill="white" opacity="0.15"/>
  
  <!-- Bottom edge highlight -->
  <line x1="55" y1="160" x2="145" y2="160" stroke="#1f9e7a" stroke-width="2" opacity="0.7"/>
</svg>
